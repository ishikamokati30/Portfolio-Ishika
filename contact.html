<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Ishika's Portfolio</title>
    <link rel="stylesheet" href="contact.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="logo">Isha</div>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="skills.html">Skills</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="achievements.html">Achievements</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main class="contact-page">
      <section class="contact-card">
        <div class="contact-copy">
          <p class="eyebrow">Let's connect</p>
          <h1>Get in Touch</h1>
          <p class="intro">
            Feel free to reach out for collaborations or opportunities.
          </p>

          <div class="social-links">
            <a href="https://github.com/ishikamokati30" target="_blank" rel="noreferrer">
              GitHub
            </a>
            <a
              href="https://www.linkedin.com/in/ishika-mokati-a423552a9/"
              target="_blank"
              rel="noreferrer"
            >
              LinkedIn
            </a>
          </div>
        </div>

        <form class="contact-form" id="contactForm" novalidate>
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input
              type="text"
              id="fullName"
              name="fullName"
              placeholder="Enter your full name"
              required
            />
            <small class="error-message"></small>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email address"
              required
            />
            <small class="error-message"></small>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea
              id="message"
              name="message"
              rows="6"
              placeholder="Write your message here"
              required
            ></textarea>
            <small class="error-message"></small>
          </div>

          <button type="submit" class="submit-btn">Send Message</button>
          <p class="success-message" id="successMessage" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="contact.js"></script>
  </body>
</html>
